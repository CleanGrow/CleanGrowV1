<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle LED</title>
</head>
<body>

<h2>Controle do LED</h2>

<button id="btnLed">Carregando...</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    set,
    onValue
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqmTTuImI3XryQ9D2X-eJ1yNrFfKtwvpM",
  authDomain: "cleangrow-8b552.firebaseapp.com",
  databaseURL: "https://cleangrow-8b552-default-rtdb.firebaseio.com",
  projectId: "cleangrow-8b552",
  storageBucket: "cleangrow-8b552.firebasestorage.app",
  messagingSenderId: "823736787199",
  appId: "1:823736787199:web:26c85a9bf702422e186cca"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ledRef = ref(db, "led/state");
const btn = document.getElementById("btnLed");

let estadoAtual = 0;

// Atualiza o botão quando o Firebase mudar
onValue(ledRef, (snapshot) => {
    estadoAtual = snapshot.val() || 0;

    btn.textContent =
        estadoAtual === 1
        ? "Desligar LED"
        : "Ligar LED";
});

// Alterna entre 0 e 1
btn.addEventListener("click", () => {
    set(ledRef, estadoAtual === 1 ? 0 : 1);
});
</script>

</body>
</html>
