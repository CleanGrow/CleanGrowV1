<!DOCTYPE html>

<title>Irrigação</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

    <h2>Reservatório</h2>

    <p>Nível Atual</p>

    <div class="valor" id="res_nivel">
        0%
    </div>

    <br>

    <div class="barra">
        <div id="nivelBar"></div>
    </div>

</div>

<div class="card">

    <h2>Irrigação</h2>

    <p>Status</p>

    <div class="valor" id="stat_irrig">
        --
    </div>

</div>

<div class="card">

    <h2>Válvula</h2>

    <p>Status</p>

    <div class="valor" id="stat_valv">
        --
    </div>

</div>

<div class="card">

    <button class="botao" id="btnIrrigar">
        Irrigar Agora
    </button>

</div>

<a href="index.html" class="voltar">
    ← Voltar
</a>

<script src="script.js" type="module"></script>

</body>
</html>
